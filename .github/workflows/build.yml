name: Build on 1.20.1

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Show build/libs
        run: |
          echo "==== build/libs ===="
          ls -lah build/libs || true
          echo "==== All jars ===="
          find . -name "*.jar"

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: build-libs
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 30